# 최상단에 slam_toolbox라는 특정 노드 이름을 쓰지 않고 와일드카드(**)를 씁니다!
# 이렇게 해야 네임스페이스(ugv1, ugv2)가 붙어도 설정이 완벽하게 로드됩니다.
/**:
  ros__parameters:
    # 🌟 [필수] Webots 시뮬레이션과 시간을 동기화!
    use_sim_time: true 

    # 프레임 (런치 파일에서 덮어쓰지만, 보험용으로 기본값 세팅)
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: scan

    # 🌟 회원님이 찾으신 핵심 스위치! (빠른 TF 발행)
    transform_publish_period: 0.02  # 50Hz (0.01은 CPU 부하가 클 수 있어 0.02 추천)
    publish_map_to_odom_tf: true

    # 동작 모드
    mode: mapping

    # 🌟 [수정] Webots 라이다 VLP-16 스펙에 맞춤
    min_laser_range: 0.3    # 바닥 찍힘 방지 (0.2 -> 0.3 추천)
    max_laser_range: 50.0   # 최대 감지 거리 명시

    # 맵 설정 (연산 부하를 줄이기 위해 간격을 살짝 넓힙니다)
    map_update_interval: 1.0       # 너무 빠르면 버벅임 (0.1 -> 1.0 추천)
    resolution: 0.1              # 일반적인 Nav2 해상도
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2

    # 기타 권장 설정
    transform_timeout: 0.5         # 다중 로봇 렉(지연)을 고려해 넉넉하게 0.5초 부여
    tf_buffer_duration: 30.0
    minimum_time_interval: 0.5

    # QoS 및 최적화
    scan_queue_size: 10
    use_scan_matching: true
    use_scan_barycenter: true