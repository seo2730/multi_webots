/ugv1/slam_toolbox:
  ros__parameters:
    # 프레임
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /ugv1/scan

    # ✅ 이게 핵심 - TF publish 주기, 0이면 TF 안 쏨
    transform_publish_period: 0.02

    # ✅ map→odom TF 명시
    publish_map_to_odom_tf: true

    # 동작 모드
    mode: mapping
    use_sim_time: false  

    min_laser_range: 0.2  # 0.0 → 0.2로 수정 (라이다 실제 최소 범위)

    # 맵 설정
    map_update_interval: 0.05
    resolution: 0.05
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05

    # 기타 권장 설정
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    minimum_time_interval: 0.5

    # QoS 설정
    scan_queue_size: 10